{{- /*
Create HorizontalPodAutoscaler resources for microservices when autoscaling is enabled.
Uses top-level values.autoscaling.* settings.
*/ -}}
{{- if .Values.autoscaling.enabled }}
{{- $svcList := list "inventory" "booking" "order" "apigateway" }}
{{- range $svc := $svcList }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "event-booking-system-chart.fullname" $ }}-{{ $svc }}-hpa
  labels:
    app: {{ $svc }}
    app.kubernetes.io/managed-by: "Helm"
  annotations:
    meta.helm.sh/release-name: {{ $.Release.Name | quote }}
    meta.helm.sh/release-namespace: {{ $.Release.Namespace | quote }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "event-booking-system-chart.fullname" $ }}-{{ $svc }}
  minReplicas: {{ $.Values.autoscaling.minReplicas }}
  maxReplicas: {{ $.Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.autoscaling.targetCPUUtilizationPercentage }}
---
{{- end }}
{{- end }}
