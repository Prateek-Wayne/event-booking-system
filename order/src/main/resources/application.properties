spring.application.name=order
server.port=8003

spring.datasource.url=jdbc:postgresql://localhost:5432/ebs
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.name=ebs
spring.jpa.hibernate.ddl-auto=update

inventory.service.url=http://localhost:8000

#Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=bookingEvent:com.example.leetjourney.bookingservice.event.BookingEvent
