services:

  inventory:
    build: ./inventory
    environment:
      SERVER_PORT: 8000
      SPRING_APPLICATION_NAME: inventory
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ebs
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_NAME: ebs
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
    # ports:
    #   - "8000:8000"
  booking:
    build: ./booking
    environment:
      SERVER_PORT: 8001
      SPRING_APPLICATION_NAME: booking
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ebs
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_NAME: ebs
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # inventory service
      INVENTORY_SERVICE_URL: http://inventory:8000
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
      SPRING_KAFKA_TEMPLATE_DEFAULT_TOPIC: booking
      SPRING_KAFKA_PRODUCER_KEY_SERIALIZER: org.apache.kafka.common.serialization.StringSerializer
      SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER: org.springframework.kafka.support.serializer.JsonSerializer
    depends_on:
      - db
      - inventory
    ports:
      - "8000:8000"
  order:
    build: ./order
    environment:
      SERVER_PORT: 8002
      SPRING_APPLICATION_NAME: order
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ebs
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_NAME: ebs
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # inventory service
      INVENTORY_SERVICE_URL: http://inventory:8000
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-broker:29092
      SPRING_KAFKA_CONSUMER_GROUP_ID: order-service
      SPRING_KAFKA_TEMPLATE_DEFAULT_TOPIC: booking
      SPRING_KAFKA_PRODUCER_KEY_SERIALIZER: org.apache.kafka.common.serialization.StringSerializer
      SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER: org.springframework.kafka.support.serializer.JsonSerializer
      SPRING_KAFKA_CONSUMER_PROPERTY_SPRING_JSON_TYPE_MAPPING: bookingEvent:com.ticketflow.booking.dto.response.BookingResponse

  apigateway:
    build: ./apigateway
    environment:
      SPRING_APPLICATION_NAME: apigateway
      SERVER_PORT: 8090
      INVENTORY_SERVICE_URL: http://inventory:8000
      BOOKING_SERVICE_URL: http://booking:8001
    ports:
      - "8090:8090"
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ebs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql


  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 3000

  kafka-broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8084:8080"
    depends_on:
      - kafka-broker
    environment:
      KAFKA_CLUSTERS_NAME: local
      KAFKA_CLUSTERS_BOOTSTRAPSERVERS: kafka-broker:29092
      DYNAMIC_CONFIG_ENABLED: 'true'

  kafka-schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    hostname: kafka-schema-registry
    container_name: kafka-schema-registry
    depends_on:
      - kafka-broker
    ports:
      - "8083:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: kafka-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka-broker:29092'
      SCHEMA_REGISTRY_LISTENERS: http://kafka-schema-registry:8081

volumes:
  pgdata:
